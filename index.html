<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Be Vietnam Pro',sans-serif;}
:root{--primary:#0D47A1;--primary2:#1565C0;--primary3:#1976D2;--accent:#42A5F5;--bg:#f0f4ff;--card:#fff;--text:#1a237e;--gray:#607d8b;}
body{background:var(--bg);min-height:100vh;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0D47A1 0%,#1976D2 100%);}
.auth-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo h1{font-size:28px;font-weight:800;color:var(--primary);letter-spacing:2px;}
.auth-logo p{color:var(--gray);font-size:13px;margin-top:4px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.form-group input{width:100%;padding:12px 16px;border:2px solid #e3eaf5;border-radius:10px;font-size:14px;outline:none;transition:.2s;}
.form-group input:focus{border-color:var(--primary);}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary2);}
.err{color:#e53935;font-size:13px;margin-top:8px;text-align:center;}
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--primary);color:#fff;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-logo h2{font-size:16px;font-weight:800;letter-spacing:1px;}
.sidebar-logo p{font-size:11px;opacity:.7;margin-top:2px;}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:13px;font-weight:500;opacity:.8;transition:.2s;border-left:3px solid transparent;}
.nav-item:hover,.nav-item.active{opacity:1;background:rgba(255,255,255,.1);border-left-color:#fff;}
.nav-item span.icon{font-size:16px;width:20px;text-align:center;}
.nav-sep{padding:6px 20px;font-size:10px;opacity:.45;letter-spacing:.8px;margin-top:6px;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
.user-info{font-size:12px;opacity:.8;}
.user-info strong{display:block;font-size:13px;opacity:1;}
.logout-btn{margin-top:10px;width:100%;padding:8px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;border-radius:8px;font-size:12px;cursor:pointer;}
.logout-btn:hover{background:rgba(255,255,255,.1);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#fff;padding:16px 28px;border-bottom:1px solid #e3eaf5;display:flex;align-items:center;justify-content:space-between;}
.topbar h3{font-size:18px;font-weight:700;color:var(--text);}
.content{flex:1;padding:28px;overflow-y:auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(13,71,161,.08);}
.stat-card .num{font-size:32px;font-weight:800;color:var(--primary);}
.stat-card .label{font-size:12px;color:var(--gray);margin-top:4px;}
.stat-card .icon{font-size:28px;margin-bottom:8px;}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(13,71,161,.08);margin-bottom:20px;}
.card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--gray);border-bottom:2px solid #e3eaf5;text-transform:uppercase;letter-spacing:.5px;}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f0f4ff;color:#333;}
tr:hover td{background:#f8faff;}
tfoot tr td{border-top:2px solid #a5d6a7;background:#e8f5e9 !important;font-weight:800;color:#1b5e20;font-size:14px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-draft{background:#eceff1;color:#607d8b;}
.badge-pending{background:#fff3e0;color:#e65100;}
.badge-confirmed{background:#e8f5e9;color:#2e7d32;}
.badge-partial{background:#e3f2fd;color:#1565c0;}
.badge-rejected{background:#ffebee;color:#c62828;}
.badge-cancelled{background:#f5f5f5;color:#757575;}
.badge-delivering{background:#f3e5f5;color:#6a1b9a;}
.badge-delivered{background:#e0f2f1;color:#00695c;}
.badge-closed{background:#263238;color:#fff;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
select,input[type=text],input[type=date],input[type=number],textarea{width:100%;padding:10px 14px;border:2px solid #e3eaf5;border-radius:10px;font-size:13px;outline:none;font-family:inherit;}
select:focus,input:focus,textarea:focus{border-color:var(--primary);}
.btn-sm{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:.15s;}
.btn-sm:hover{opacity:.85;}
.btn-primary-sm{background:var(--primary);color:#fff;}
.btn-success{background:#2e7d32;color:#fff;}
.btn-danger{background:#c62828;color:#fff;}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{width:auto;flex:1;min-width:120px;}
.empty{text-align:center;padding:40px;color:var(--gray);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:16px;padding:28px;width:92%;max-width:600px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px;}
.tl-item{display:flex;gap:12px;margin-bottom:14px;}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:4px;}
.tl-content .tl-title{font-size:13px;font-weight:600;color:#1a237e;}
.tl-content .tl-time{font-size:11px;color:var(--gray);}
@media(max-width:768px){.sidebar{display:none;}.form-row{grid-template-columns:1fr;}}
</style>
</head>

function doLogin(){
  const u=document.getElementById('loginUser').value.trim().toLowerCase();
  const p=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');
  err.textContent='';
  const found=USERS_DB[u];
  if(!found||found.password!==p){err.textContent='⚠ Tên đăng nhập hoặc mật khẩu không đúng';return;}
  currentUser={username:u,...found};
  localStorage.setItem('vos_user',JSON.stringify(currentUser));
  showApp();
}
function logout(){
  currentUser=null;cart=[];
  localStorage.removeItem('vos_user');
  document.getElementById('authPage').style.display='flex';
  document.getElementById('appPage').style.display='none';
}

  document.getElementById('topDate').textContent=new Date().toLocaleDateString('vi-VN',{weekday:'long',day:'numeric',month:'numeric',year:'numeric'});

  navigateTo(defaultPage());
}

function buildNav(){
  const items=NAV_ITEMS[currentUser.role]||[];
  document.getElementById('sidebarNav').innerHTML=items.map(i=>{
    if(i.sep) return `<div class="nav-sep">${i.sep}</div>`;
    return `<div class="nav-item" id="nav_${i.id}" onclick="navigateTo('${i.id}')"><span class="icon">${i.icon}</span>${i.label}</div>`;
  }).join('');
}

function navigateTo(page){
  if(!page) return;
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl=document.getElementById('nav_'+page);
  if(navEl) navEl.classList.add('active');
  const titles={
    store_dashboard:'Dashboard',store_create:'Tạo đơn hàng',store_orders:'Lịch sử đơn',
    supplier_dashboard:'Dashboard NCC',supplier_orders:'Đơn hàng cần xác nhận',
    admin_dashboard:'Dashboard tổng',admin_orders:'Tất cả đơn hàng',
    admin_suppliers:'Quản lý nhà cung cấp',admin_products:'Quản lý sản phẩm',admin_logs:'Event Logs',
    settings:'Cài đặt',guide:'Hướng dẫn sử dụng',
  };
  document.getElementById('pageTitle').textContent=titles[page]||page;
  const renders={
    store_dashboard:renderStoreDashboard,store_create:renderStoreCreate,store_orders:renderStoreOrders,
    supplier_dashboard:renderSupplierDashboard,supplier_orders:renderSupplierOrders,
    admin_dashboard:renderAdminDashboard,admin_orders:renderAdminOrders,
    admin_suppliers:renderAdminSuppliers,admin_products:renderAdminProducts,admin_logs:renderAdminLogs,
    settings:renderSettings,guide:renderGuide,
  };
  const fn=renders[page];
  if(fn){document.getElementById('mainContent').innerHTML=fn();if(page==='store_create')loadCatalog();}
  else document.getElementById('mainContent').innerHTML='<div class="empty">🚧 Trang đang phát triển</div>';
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function fmtMoney(n){return Number(n||0).toLocaleString('vi-VN')+'đ';}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('vi-VN');}
function fmtDateTime(d){if(!d)return'—';return new Date(d).toLocaleString('vi-VN');}
function statusBadge(s){
  const map={draft:['badge-draft','Nháp'],pending_supplier:['badge-pending','Chờ NCC'],confirmed:['badge-confirmed','Xác nhận'],partial_confirmed:['badge-partial','Xác nhận 1 phần'],rejected:['badge-rejected','Từ chối'],cancelled:['badge-cancelled','Đã hủy'],delivering:['badge-delivering','Đang giao'],delivered:['badge-delivered','Đã giao'],closed:['badge-closed','Đóng']};
  const[cls,lbl]=map[s]||['badge-draft',s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}
function myOrders(){
  if(currentUser.role==='store_user') return orders.filter(o=>o.store_id===currentUser.store_id);
  if(currentUser.role==='supplier_user') return orders.filter(o=>o.supplier_id===currentUser.supplier_id);
  if(currentPage.startsWith('store_')&&currentUser._viewStoreId) return orders.filter(o=>o.store_id===currentUser._viewStoreId);
  if(currentPage.startsWith('supplier_')&&currentUser._viewSupplierId) return orders.filter(o=>o.supplier_id===currentUser._viewSupplierId);
  return orders;
}
function getActiveStoreId(){return currentUser.role==='store_user'?currentUser.store_id:(currentUser._viewStoreId||null);}
function setViewStore(sid){currentUser._viewStoreId=sid;navigateTo(currentPage);}
function setViewSupplier(sid){currentUser._viewSupplierId=sid;navigateTo(currentPage);}
function generateOrderCode(){
  const sid=getActiveStoreId()||'ADM';
  const map={S01:'PHB',S02:'VIT',S03:'AVD'};
  const sc=map[sid]||sid.slice(0,3).toUpperCase();
  const dt=new Date().toISOString().slice(0,10).replace(/-/g,'');
  const seq=String(orders.filter(o=>o.store_id===sid).length+1).padStart(3,'0');
  return `ORD-${sc}-${dt}-${seq}`;
}

      </div>
      <div id="invoicePreview" style="margin-top:12px"></div>

      </div>
    </div>`;
}

function loadCatalog(){
  const ncc=document.getElementById('selNCC')?.value;
  if(!ncc) return;
  const prods=PRODUCTS[ncc]||[];
  if(!prods.length){const el=document.getElementById('catalogList');if(el)el.innerHTML='<div class="empty">Không có sản phẩm</div>';return;}
  const rows=prods.map((p,i)=>`
    <tr id="crow_${p.id}">
      <td style="text-align:center;color:#999;font-size:12px">${i+1}</td>
      <td style="font-weight:600;color:#1a237e;font-size:13px">${p.name}</td>
      <td style="text-align:center;font-size:11px;color:#546e7a;font-family:monospace">${p.barcode||'—'}</td>
      <td style="text-align:center;font-size:12px;color:#607d8b">${p.unit}</td>
      <td style="text-align:center"><input type="number" id="qty_${p.id}" min="0" value="0" style="width:70px;text-align:center;padding:6px;border:2px solid #e3eaf5;border-radius:8px;font-size:13px;font-weight:600" oninput="updateCart();highlightRow('${p.id}',this.value)"></td>
      <td style="text-align:right;font-size:13px;white-space:nowrap">${fmtMoney(p.price)}</td>
      <td style="text-align:right;font-weight:700;color:var(--primary);font-size:13px;white-space:nowrap" id="sub_${p.id}">—</td>
    </tr>`).join('');
  const el=document.getElementById('catalogList');
  if(el) el.innerHTML=`<table><thead><tr style="background:#f0f4ff"><th style="width:36px;text-align:center">#</th><th>Tên sản phẩm</th><th style="width:130px;text-align:center">Mã vạch</th><th style="width:55px;text-align:center">ĐVT</th><th style="width:90px;text-align:center">Số lượng</th><th style="width:110px;text-align:right">Đơn giá</th><th style="width:120px;text-align:right">Thành tiền</th></tr></thead><tbody>${rows}</tbody></table><div style="text-align:right;padding:10px 0 0;font-size:12px;color:#999">Tổng: <strong>${prods.length}</strong> sản phẩm</div>`;
  updateCart();
}

function highlightRow(pid,val){
  const row=document.getElementById('crow_'+pid);
  const sub=document.getElementById('sub_'+pid);
  if(!row) return;
  const qty=parseInt(val)||0;
  const ncc=document.getElementById('selNCC')?.value;
  const p=(PRODUCTS[ncc]||[]).find(x=>x.id===pid);
  if(qty>0){row.style.background='#e8f5e9';if(sub&&p)sub.textContent=fmtMoney(qty*p.price);}
  else{row.style.background='';if(sub)sub.textContent='—';}
}

function updateCart(){
  const ncc=document.getElementById('selNCC')?.value;
  const prods=PRODUCTS[ncc]||[];
  cart=cart.filter(c=>c._fromAI);
  prods.forEach(p=>{
    const qty=parseInt(document.getElementById('qty_'+p.id)?.value)||0;
    if(qty>0) cart.push({...p,ordered_qty:qty,confirmed_qty:0,item_status:'pending'});
  });
  renderCart();
}

function renderCart(){
  const el=document.getElementById('cartList');
  const countEl=document.getElementById('cartCount');
  if(!el) return;
  if(countEl) countEl.textContent=cart.length;
  if(cart.length===0){el.innerHTML='<div class="empty">🛒 Chưa có sản phẩm nào trong giỏ</div>';return;}
  let total=0;
  const rows=cart.map((i,idx)=>{const sub=i.ordered_qty*i.price;total+=sub;return`<tr><td style="text-align:center;color:#999;font-size:12px">${idx+1}</td><td style="font-size:13px;font-weight:500">${i.name}</td><td style="text-align:center;font-size:12px;color:#607d8b">${i.unit}</td><td style="text-align:center;font-weight:700;color:var(--primary)">${i.ordered_qty}</td><td style="text-align:right;font-size:13px;white-space:nowrap">${fmtMoney(i.price)}</td><td style="text-align:right;font-weight:700;color:#2e7d32;white-space:nowrap">${fmtMoney(sub)}</td></tr>`;}).join('');
  el.innerHTML=`<table><thead><tr style="background:#f0f4ff"><th style="width:36px;text-align:center">#</th><th>Tên sản phẩm</th><th style="width:60px;text-align:center">ĐVT</th><th style="width:60px;text-align:center">SL</th><th style="width:110px;text-align:right">Đơn giá</th><th style="width:120px;text-align:right">Thành tiền</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="5" style="text-align:right;padding:12px">Tổng cộng:</td><td style="text-align:right;padding:12px">${fmtMoney(total)}</td></tr></tfoot></table>`;
}

function saveDraft(){
  if(cart.length===0){alert('Vui lòng chọn ít nhất 1 sản phẩm');return;}
  const sid=getActiveStoreId();if(!sid){alert('Vui lòng chọn cửa hàng');return;}
  const STORES=[{id:'S01',name:'Phú Bài'},{id:'S02',name:'Vinh Thanh'},{id:'S03',name:'An Vân Dương'}];
  const sname=currentUser.store_name||STORES.find(s=>s.id===sid)?.name||sid;
  const ncc=document.getElementById('selNCC')?.value;
  const sup=SUPPLIERS.find(s=>s.id===ncc);
  orders.push({id:'ORD'+Date.now(),order_code:generateOrderCode(),store_id:sid,store_name:sname,supplier_id:ncc,supplier_name:sup?.name||ncc,status:'draft',order_date:new Date().toISOString().slice(0,10),delivery_date:document.getElementById('deliveryDate')?.value,total:cart.reduce((s,i)=>s+i.ordered_qty*i.price,0),items:[...cart],note:document.getElementById('orderNote')?.value||''});
  alert('✅ Đã lưu nháp: '+orders[orders.length-1].order_code);
  cart=[];navigateTo('store_orders');
}
function submitOrder(){
  if(cart.length===0){alert('Vui lòng chọn ít nhất 1 sản phẩm');return;}
  const sid=getActiveStoreId();if(!sid){alert('Vui lòng chọn cửa hàng');return;}
  const STORES=[{id:'S01',name:'Phú Bài'},{id:'S02',name:'Vinh Thanh'},{id:'S03',name:'An Vân Dương'}];
  const sname=currentUser.store_name||STORES.find(s=>s.id===sid)?.name||sid;
  const ncc=document.getElementById('selNCC')?.value;
  const sup=SUPPLIERS.find(s=>s.id===ncc);
  orders.push({id:'ORD'+Date.now(),order_code:generateOrderCode(),store_id:sid,store_name:sname,supplier_id:ncc,supplier_name:sup?.name||ncc,status:'pending_supplier',order_date:new Date().toISOString().slice(0,10),delivery_date:document.getElementById('deliveryDate')?.value,total:cart.reduce((s,i)=>s+i.ordered_qty*i.price,0),items:[...cart],note:document.getElementById('orderNote')?.value||'',submitted_at:new Date().toISOString()});
  alert('✅ Đã gửi đơn tới NCC: '+orders[orders.length-1].order_code);
  cart=[];navigateTo('store_orders');
}

        <tr><th>#</th><th>Mã đơn</th><th>NCC</th><th>Ngày đặt</th><th>Ngày giao</th><th>Tổng tiền</th><th>Trạng thái</th><th></th></tr>
        ${my.map((o,i)=>`<tr data-code="${o.order_code}" data-status="${o.status}">
          <td style="color:#999">${i+1}</td><td><strong>${o.order_code}</strong></td><td>${o.supplier_name}</td>

      ${my.length===0?'<div class="empty">📭 Chưa có đơn hàng</div>':''}

function doConfirmFull(id){
  const o=orders.find(x=>x.id===id);if(!o) return;
  o.status='confirmed';o.supplier_responded_at=new Date().toISOString();
  (o.items||[]).forEach(i=>{i.confirmed_qty=i.ordered_qty;i.item_status='confirmed';});
  o.supplier_note=document.getElementById('supplierNote')?.value||'';
  closeModal();alert('✅ Đã xác nhận toàn bộ đơn hàng');navigateTo(currentPage);
}
function doConfirmPartial(id,itemCount){
  const o=orders.find(x=>x.id===id);if(!o) return;
  if(!o.items||o.items.length===0){alert('Đơn không có sản phẩm');return;}
  let hasPartial=false;
  for(let i=0;i<itemCount;i++){
    const cqty=parseInt(document.getElementById('cqty_'+i)?.value)||0;
    if(o.items[i]){o.items[i].confirmed_qty=cqty;if(cqty<o.items[i].ordered_qty)hasPartial=true;o.items[i].item_status=cqty===0?'rejected':cqty<o.items[i].ordered_qty?'partial':'confirmed';}
  }
  o.status=hasPartial?'partial_confirmed':'confirmed';
  o.supplier_responded_at=new Date().toISOString();
  o.supplier_note=document.getElementById('supplierNote')?.value||'';
  closeModal();alert('✅ Đã xác nhận '+(hasPartial?'một phần':'toàn bộ'));navigateTo(currentPage);
}
function doRejectModal(id){
  closeModal();
  showModal(`<div class="modal-title">❌ Từ chối đơn hàng</div>
    <div class="form-group"><label>Lý do từ chối *</label><textarea id="rejectReason" rows="3" placeholder="Nhập lý do..."></textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn-sm btn-danger" onclick="doReject('${id}')">Xác nhận từ chối</button>
      <button class="btn-sm btn-outline" onclick="closeModal()">Hủy</button>
    </div>`);
}
function doReject(id){
  const reason=document.getElementById('rejectReason')?.value?.trim();
  if(!reason){alert('Vui lòng nhập lý do từ chối');return;}
  const o=orders.find(x=>x.id===id);
  if(o){o.status='rejected';o.reject_reason=reason;o.supplier_responded_at=new Date().toISOString();}
  closeModal();alert('Đã từ chối đơn hàng');navigateTo(currentPage);
}

// ── AI VISION ──────────────────────────────────────────────────────────────
async function handleInvoiceUpload(input){
  const file=input.files[0];if(!file) return;
  const preview=document.getElementById('invoicePreview');
  const apiKey=localStorage.getItem('gemini_key');
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const base64=e.target.result;
    preview.innerHTML=`<div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
      <img src="${base64}" style="max-height:200px;max-width:280px;border-radius:10px;border:2px solid #90caf9;object-fit:contain">
      <div id="aiStatus" style="flex:1;min-width:200px;padding:16px;background:#fff;border-radius:10px;border:1px solid #e3eaf5">
        <div style="font-size:13px;color:#607d8b">⏳ Đang phân tích...</div>
      </div></div>`;
    if(!apiKey){
      document.getElementById('aiStatus').innerHTML=`<div style="color:#e65100;font-size:13px">⚠ Chưa có Gemini API key.<br>Vào <strong>⚙️ Cài đặt</strong> để nhập key miễn phí.</div>`;
      return;
    }
    try{await callGeminiWithRetry(base64,apiKey);}
    catch(err){document.getElementById('aiStatus').innerHTML=`<div style="color:#c62828;font-size:13px">❌ Lỗi: ${err.message}</div>`;}
  };
  reader.readAsDataURL(file);
  input.value='';
}

async function callGeminiWithRetry(base64,apiKey,maxRetries=3){
  const statusEl=document.getElementById('aiStatus');
  for(let attempt=1;attempt<=maxRetries;attempt++){
    try{
      statusEl.innerHTML=`<div style="font-size:13px;color:#1565c0">🤖 Gemini đang đọc hóa đơn... (${attempt}/${maxRetries})</div>`;
      const result=await callGeminiVision(base64,apiKey);
      applyInvoiceToForm(result);return;
    }catch(err){
      const isQuota=err.message.includes('quota')||err.message.includes('429')||err.message.includes('RESOURCE_EXHAUSTED');
      const retryMatch=err.message.match(/retry in ([0-9.]+)s/i);
      if(isQuota&&attempt<maxRetries){
        const waitSec=retryMatch?Math.ceil(parseFloat(retryMatch[1])):30;
        await countdown(statusEl,waitSec,attempt,maxRetries);
      }else{throw err;}
    }
  }
}

function countdown(el,secs,attempt,max){
  return new Promise(resolve=>{
    let r=secs;
    el.innerHTML=`<div style="font-size:13px;color:#e65100">⏳ Rate limit — thử lại sau <strong>${r}s</strong> (lần ${attempt+1}/${max})</div>`;
    const iv=setInterval(()=>{r--;if(r<=0){clearInterval(iv);resolve();}else el.innerHTML=`<div style="font-size:13px;color:#e65100">⏳ Rate limit — thử lại sau <strong>${r}s</strong> (lần ${attempt+1}/${max})</div>`;},1000);
  });
}

async function callGeminiVision(base64DataUrl,apiKey){
  const prompt=`Đọc hóa đơn đặt hàng Việt Nam trong ảnh. Chỉ trả về JSON thuần, không markdown:\n{"supplier_name":"tên NCC hoặc null","order_date":"YYYY-MM-DD hoặc null","delivery_date":"YYYY-MM-DD hoặc null","items":[{"name":"tên sản phẩm","barcode":"mã vạch hoặc null","unit":"đvt","qty":1,"unit_price":0,"total":0}],"grand_total":0}`;
  const mimeType=base64DataUrl.match(/^data:([^;]+);base64,/)?.[1]||'image/jpeg';
  const base64Data=base64DataUrl.replace(/^data:[^;]+;base64,/,'');
  const resp=await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:mimeType,data:base64Data}}]}],generationConfig:{temperature:0,maxOutputTokens:2048}})
  });
  if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||`HTTP ${resp.status}`);}
  const data=await resp.json();
  const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
  const jsonStr=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  return JSON.parse(jsonStr);
}

function applyInvoiceToForm(parsed){
  const statusEl=document.getElementById('aiStatus');
  if(!parsed||!parsed.items||parsed.items.length===0){statusEl.innerHTML='<div style="color:#e65100;font-size:13px">⚠ Không nhận dạng được sản phẩm. Thử ảnh rõ hơn.</div>';return;}
  if(parsed.delivery_date){const dtEl=document.getElementById('deliveryDate');if(dtEl)dtEl.value=parsed.delivery_date;}
  const aiItems=parsed.items.map((item,i)=>({id:'AI_'+Date.now()+'_'+i,barcode:item.barcode||'',name:item.name,unit:item.unit||'cái',price:item.unit_price||0,ordered_qty:item.qty||1,confirmed_qty:0,item_status:'pending',_fromAI:true}));
  aiItems.forEach(ai=>{const ex=cart.findIndex(c=>c.name===ai.name);if(ex>=0)cart[ex].ordered_qty+=ai.ordered_qty;else cart.push(ai);});
  renderCart();
  const countEl=document.getElementById('cartCount');if(countEl)countEl.textContent=cart.length;
  statusEl.innerHTML=`<div style="color:#2e7d32;font-weight:700;font-size:14px;margin-bottom:8px">✅ Đọc thành công!</div>
    <div style="font-size:13px;line-height:1.8;color:#333">
      ${parsed.supplier_name?`🏭 NCC: <strong>${parsed.supplier_name}</strong><br>`:''}
      📦 Sản phẩm: <strong>${aiItems.length} dòng</strong><br>
      💰 Tổng hóa đơn: <strong>${fmtMoney(parsed.grand_total||0)}</strong>
    </div>
    <div style="margin-top:8px;font-size:12px;color:#607d8b">⚠ Kiểm tra lại trước khi gửi NCC.</div>`;
}
