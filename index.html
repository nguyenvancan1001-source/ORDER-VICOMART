<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VicoMart Order System</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Be Vietnam Pro',sans-serif;}
:root{--primary:#0D47A1;--primary2:#1565C0;--primary3:#1976D2;--accent:#42A5F5;--bg:#f0f4ff;--card:#fff;--text:#1a237e;--gray:#607d8b;}
body{background:var(--bg);min-height:100vh;}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0D47A1 0%,#1976D2 100%);}
.auth-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo h1{font-size:28px;font-weight:800;color:var(--primary);letter-spacing:2px;}
.auth-logo p{color:var(--gray);font-size:13px;margin-top:4px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
.form-group input{width:100%;padding:12px 16px;border:2px solid #e3eaf5;border-radius:10px;font-size:14px;outline:none;transition:.2s;}
.form-group input:focus{border-color:var(--primary);}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary2);}
.err{color:#e53935;font-size:13px;margin-top:8px;text-align:center;}
/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--primary);color:#fff;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-logo h2{font-size:16px;font-weight:800;letter-spacing:1px;}
.sidebar-logo p{font-size:11px;opacity:.7;margin-top:2px;}
.sidebar-nav{flex:1;padding:16px 0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:13px;font-weight:500;opacity:.8;transition:.2s;border-left:3px solid transparent;}
.nav-item:hover,.nav-item.active{opacity:1;background:rgba(255,255,255,.1);border-left-color:#fff;}
.nav-item span.icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);}
.user-info{font-size:12px;opacity:.8;}
.user-info strong{display:block;font-size:13px;opacity:1;}
.logout-btn{margin-top:10px;width:100%;padding:8px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;border-radius:8px;font-size:12px;cursor:pointer;}
.logout-btn:hover{background:rgba(255,255,255,.1);}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#fff;padding:16px 28px;border-bottom:1px solid #e3eaf5;display:flex;align-items:center;justify-content:space-between;}
.topbar h3{font-size:18px;font-weight:700;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.content{flex:1;padding:28px;overflow-y:auto;}
/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(13,71,161,.08);}
.stat-card .num{font-size:32px;font-weight:800;color:var(--primary);}
.stat-card .label{font-size:12px;color:var(--gray);margin-top:4px;}
.stat-card .icon{font-size:28px;margin-bottom:8px;}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(13,71,161,.08);margin-bottom:20px;}
.card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
/* TABLE */
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 12px;font-size:12px;font-weight:700;color:var(--gray);border-bottom:2px solid #e3eaf5;text-transform:uppercase;letter-spacing:.5px;}
td{padding:12px;font-size:13px;border-bottom:1px solid #f0f4ff;color:#333;}
tr:hover td{background:#f8faff;}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.badge-draft{background:#eceff1;color:#607d8b;}
.badge-pending{background:#fff3e0;color:#e65100;}
.badge-confirmed{background:#e8f5e9;color:#2e7d32;}
.badge-partial{background:#e3f2fd;color:#1565c0;}
.badge-rejected{background:#ffebee;color:#c62828;}
.badge-cancelled{background:#f5f5f5;color:#757575;}
.badge-delivering{background:#f3e5f5;color:#6a1b9a;}
.badge-delivered{background:#e0f2f1;color:#00695c;}
.badge-closed{background:#263238;color:#fff;}
/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row.full{grid-template-columns:1fr;}
select,input[type=text],input[type=date],input[type=number],textarea{width:100%;padding:10px 14px;border:2px solid #e3eaf5;border-radius:10px;font-size:13px;outline:none;font-family:inherit;}
select:focus,input:focus,textarea:focus{border-color:var(--primary);}
.btn-sm{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;}
.btn-primary-sm{background:var(--primary);color:#fff;}
.btn-success{background:#2e7d32;color:#fff;}
.btn-danger{background:#c62828;color:#fff;}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);}
/* CATALOG */
.catalog-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f4ff;}
.catalog-item:last-child{border:none;}
.catalog-info{flex:1;}
.catalog-info .name{font-size:13px;font-weight:600;color:#1a237e;}
.catalog-info .meta{font-size:11px;color:var(--gray);margin-top:2px;}
.qty-input{width:70px;text-align:center;}
/* TIMELINE */
.timeline{padding:0;}
.tl-item{display:flex;gap:12px;margin-bottom:16px;}
.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:4px;}
.tl-content{flex:1;}
.tl-title{font-size:13px;font-weight:600;color:#1a237e;}
.tl-time{font-size:11px;color:var(--gray);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:20px;}
/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--gray);}
.empty .icon{font-size:48px;margin-bottom:12px;}
/* FILTER */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{width:auto;flex:1;min-width:120px;}
/* RESPONSIVE */
@media(max-width:768px){.sidebar{display:none;}.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="authPage" class="auth-wrap">

    <div class="auth-logo">
      <h1>🛒 VICOMART</h1>
      <p>Hệ thống đặt hàng nhà cung cấp</p>
    </div>

      Demo: admin/admin123 · buyer/buyer123 · store1/store123 · supplier1/sup123

  </div>
</div>

<!-- APP -->
<div id="appPage" class="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo">
      <h2>🛒 VICOMART</h2>
      <p id="sbRole">Order System</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <strong id="sbUser">-</strong>
        <span id="sbStore">-</span>
      </div>
      <button class="logout-btn" onclick="logout()">Đăng xuất</button>

  <div class="main">
    <div class="topbar">

    <div class="content" id="mainContent"></div>
  </div>
</div>

<div id="modalContainer"></div>

<script>

  {id:'ORD003',order_code:'ORD-VIT-20260321-001',store_id:'S02',store_name:'Vinh Thanh',supplier_id:'NCC01',supplier_name:'NCC Rau Củ ABC',status:'draft',order_date:'2026-03-21',delivery_date:'2026-03-23',total:0,items:[]},
  {id:'ORD004',order_code:'ORD-PHB-20260319-001',store_id:'S01',store_name:'Phú Bài',supplier_id:'NCC03',supplier_name:'NCC Đồ Khô DEF',status:'delivered',order_date:'2026-03-19',delivery_date:'2026-03-20',total:890000,items:[{id:'P011',name:'Gạo Jasmine',unit:'kg',ordered_qty:30,confirmed_qty:30,price:22000,item_status:'confirmed'},{id:'P013',name:'Nước mắm',unit:'chai',ordered_qty:5,confirmed_qty:4,price:45000,item_status:'partial'}]},
  {id:'ORD005',order_code:'ORD-VIT-20260320-001',store_id:'S02',store_name:'Vinh Thanh',supplier_id:'NCC02',supplier_name:'NCC Thực Phẩm XYZ',status:'rejected',order_date:'2026-03-20',delivery_date:'2026-03-22',total:0,items:[],reject_reason:'Hết hàng trong kho'},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentUser = null;
let currentPage = '';
let cart = [];
let orders = [...DEMO_ORDERS];

// ── AUTH ──────────────────────────────────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';
  const found = USERS_DB[u];
  if (!found || found.password !== p) { err.textContent = '⚠ Tên đăng nhập hoặc mật khẩu không đúng'; return; }
  currentUser = { username: u, ...found };
  localStorage.setItem('vos_user', JSON.stringify(currentUser));
  showApp();
}

function logout() {
  currentUser = null;
  localStorage.removeItem('vos_user');
  document.getElementById('authPage').style.display = 'flex';
  document.getElementById('appPage').style.display = 'none';
}

function showApp() {
  document.getElementById('authPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'flex';
  document.getElementById('sbUser').textContent = currentUser.name;
  document.getElementById('sbStore').textContent = currentUser.store_name || currentUser.supplier_name || '';
  document.getElementById('sbRole').textContent = roleLabel(currentUser.role);
  document.getElementById('topDate').textContent = new Date().toLocaleDateString('vi-VN',{weekday:'long',day:'numeric',month:'numeric',year:'numeric'});
  buildNav();
  cart = [];
  navigateTo(defaultPage());
}

function roleLabel(r) {
  return {admin:'Quản trị viên',buyer_head_office:'Trưởng phòng mua',store_user:'Nhân viên cửa hàng',supplier_user:'Nhà cung cấp'}[r]||r;
}

function defaultPage() {
  return {admin:'admin_dashboard',buyer_head_office:'admin_dashboard',store_user:'store_dashboard',supplier_user:'supplier_dashboard'}[currentUser.role]||'store_dashboard';
}

// ── NAV ───────────────────────────────────────────────────────────────────────
const NAV_ITEMS = {
  store_user:[
    {id:'store_dashboard',icon:'📊',label:'Dashboard'},
    {id:'store_create',icon:'➕',label:'Tạo đơn hàng'},
    {id:'store_orders',icon:'📋',label:'Lịch sử đơn'},
  ],
  supplier_user:[
    {id:'supplier_dashboard',icon:'📊',label:'Dashboard NCC'},
    {id:'supplier_orders',icon:'📦',label:'Đơn cần xác nhận'},
  ],
  admin:[
    {id:'admin_dashboard',icon:'📊',label:'Dashboard tổng'},
    {id:'admin_orders',icon:'📋',label:'Tất cả đơn hàng'},
    {id:'admin_suppliers',icon:'🏭',label:'Quản lý NCC'},
    {id:'admin_products',icon:'📦',label:'Sản phẩm'},
    {id:'admin_logs',icon:'📜',label:'Event Logs'},
  ],
  buyer_head_office:[
    {id:'admin_dashboard',icon:'📊',label:'Dashboard tổng'},
    {id:'admin_orders',icon:'📋',label:'Tất cả đơn hàng'},
    {id:'admin_suppliers',icon:'🏭',label:'Nhà cung cấp'},
    {id:'admin_logs',icon:'📜',label:'Event Logs'},
  ],
};

function buildNav() {
  const items = NAV_ITEMS[currentUser.role] || [];
  document.getElementById('sidebarNav').innerHTML = items.map(i =>
    `<div class="nav-item" id="nav_${i.id}" onclick="navigateTo('${i.id}')"><span class="icon">${i.icon}</span>${i.label}</div>`
  ).join('');
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav_'+page);
  if (navEl) navEl.classList.add('active');
  const titles = {
    store_dashboard:'Dashboard',store_create:'Tạo đơn hàng',store_orders:'Lịch sử đơn',
    supplier_dashboard:'Dashboard NCC',supplier_orders:'Đơn hàng cần xác nhận',
    admin_dashboard:'Dashboard tổng',admin_orders:'Tất cả đơn hàng',
    admin_suppliers:'Quản lý nhà cung cấp',admin_products:'Quản lý sản phẩm',admin_logs:'Event Logs',
  };
  document.getElementById('pageTitle').textContent = titles[page]||page;
  const renders = {
    store_dashboard: renderStoreDashboard,
    store_create: renderStoreCreate,
    store_orders: renderStoreOrders,
    supplier_dashboard: renderSupplierDashboard,
    supplier_orders: renderSupplierOrders,
    admin_dashboard: renderAdminDashboard,
    admin_orders: renderAdminOrders,
    admin_suppliers: renderAdminSuppliers,
    admin_products: renderAdminProducts,
    admin_logs: renderAdminLogs,
  };
  const fn = renders[page];
  if (fn) {
    document.getElementById('mainContent').innerHTML = fn();
    if (page === 'store_create') loadCatalog();
  } else {
    document.getElementById('mainContent').innerHTML = '<div class="empty"><div class="icon">🚧</div><p>Trang đang phát triển</p></div>';
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmtMoney(n) { return Number(n||0).toLocaleString('vi-VN')+'đ'; }
function fmtDate(d) { if(!d)return'-'; const dt=new Date(d); return dt.toLocaleDateString('vi-VN'); }
function statusBadge(s) {
  const map = {
    draft:['badge-draft','Nháp'],pending_supplier:['badge-pending','Chờ NCC'],
    confirmed:['badge-confirmed','Xác nhận'],partial_confirmed:['badge-partial','Xác nhận một phần'],
    rejected:['badge-rejected','Từ chối'],cancelled:['badge-cancelled','Đã hủy'],
    delivering:['badge-delivering','Đang giao'],delivered:['badge-delivered','Đã giao'],closed:['badge-closed','Đóng'],
  };
  const [cls,lbl] = map[s]||['badge-draft',s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}
function myOrders() {
  if (currentUser.role==='store_user') return orders.filter(o=>o.store_id===currentUser.store_id);
  if (currentUser.role==='supplier_user') return orders.filter(o=>o.supplier_id===currentUser.supplier_id);
  return orders;
}
function generateOrderCode() {
  const storeCode = currentUser.store_id==='S01'?'PHB':'VIT';
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const seq = String(orders.filter(o=>o.store_id===currentUser.store_id).length+1).padStart(3,'0');
  return `ORD-${storeCode}-${date}-${seq}`;
}

// ── STORE DASHBOARD ────────────────────────────────────────────────────────────
function renderStoreDashboard() {
  const my = myOrders();
  const stats = [
    {icon:'📋',num:my.length,label:'Tổng đơn hàng'},
    {icon:'⏳',num:my.filter(o=>o.status==='pending_supplier').length,label:'Chờ NCC xác nhận'},
    {icon:'✅',num:my.filter(o=>o.status==='confirmed').length,label:'Đã xác nhận'},
    {icon:'🚚',num:my.filter(o=>o.status==='delivered').length,label:'Đã giao'},
  ];
  return `
    <div class="stat-grid">${stats.map(s=>`<div class="stat-card"><div class="icon">${s.icon}</div><div class="num">${s.num}</div><div class="label">${s.label}</div></div>`).join('')}</div>
    <div class="card">
      <div class="card-title">📋 Đơn hàng gần đây</div>
      <table>

function loadCatalog() {
  const ncc = document.getElementById('selNCC')?.value;
  if (!ncc) return;
  const prods = PRODUCTS[ncc]||[];
  const html = prods.map(p=>`
    <div class="catalog-item">
      <div class="catalog-info">
        <div class="name">${p.name}</div>
        <div class="meta">${fmtMoney(p.price)} / ${p.unit}</div>
      </div>
      <input type="number" class="qty-input" id="qty_${p.id}" min="0" value="0" placeholder="0" onchange="updateCart()">
    </div>`).join('');
  const el = document.getElementById('catalogList');
  if (el) el.innerHTML = html || '<div class="empty">Không có sản phẩm</div>';
  updateCart();
}

function updateCart() {
  const ncc = document.getElementById('selNCC')?.value;
  const prods = PRODUCTS[ncc]||[];
  cart = [];
  prods.forEach(p => {
    const qty = parseInt(document.getElementById('qty_'+p.id)?.value)||0;
    if (qty>0) cart.push({...p, ordered_qty:qty, item_status:'pending', confirmed_qty:0});
  });
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cartList');
  const countEl = document.getElementById('cartCount');
  if (!el) return;
  if (countEl) countEl.textContent = cart.length;
  if (cart.length===0) { el.innerHTML='<div class="empty"><div>Chưa có sản phẩm nào</div></div>'; return; }
  let total = 0;
  const rows = cart.map(i=>{ const sub=i.ordered_qty*i.price; total+=sub; return `<tr><td>${i.name}</td><td>${i.ordered_qty} ${i.unit}</td><td>${fmtMoney(i.price)}</td><td><strong>${fmtMoney(sub)}</strong></td></tr>`; }).join('');
  el.innerHTML = `<table><tr><th>Sản phẩm</th><th>SL</th><th>Đơn giá</th><th>Thành tiền</th></tr>${rows}</table>
    <div style="text-align:right;margin-top:12px;font-size:15px;font-weight:700;color:var(--primary)">Tổng: ${fmtMoney(total)}</div>`;
}

function saveDraft() {
  if (cart.length===0) { alert('Vui lòng chọn ít nhất 1 sản phẩm'); return; }
  const ncc = document.getElementById('selNCC')?.value;
  const sup = SUPPLIERS.find(s=>s.id===ncc);
  const order = {
    id:'ORD'+Date.now(),
    order_code: generateOrderCode(),
    store_id: currentUser.store_id,
    store_name: currentUser.store_name,
    supplier_id: ncc,
    supplier_name: sup?.name||ncc,
    status:'draft',
    order_date: new Date().toISOString().slice(0,10),
    delivery_date: document.getElementById('deliveryDate')?.value,
    total: cart.reduce((s,i)=>s+i.ordered_qty*i.price,0),
    items:[...cart],
    note: document.getElementById('orderNote')?.value||'',
  };
  orders.push(order);
  alert('✅ Đã lưu nháp: '+order.order_code);
  cart=[];
  navigateTo('store_orders');
}

function submitOrder() {
  if (cart.length===0) { alert('Vui lòng chọn ít nhất 1 sản phẩm'); return; }
  const ncc = document.getElementById('selNCC')?.value;
  const sup = SUPPLIERS.find(s=>s.id===ncc);
  const order = {
    id:'ORD'+Date.now(),
    order_code: generateOrderCode(),
    store_id: currentUser.store_id,
    store_name: currentUser.store_name,
    supplier_id: ncc,
    supplier_name: sup?.name||ncc,
    status:'pending_supplier',
    order_date: new Date().toISOString().slice(0,10),
    delivery_date: document.getElementById('deliveryDate')?.value,
    total: cart.reduce((s,i)=>s+i.ordered_qty*i.price,0),
    items:[...cart],
    note: document.getElementById('orderNote')?.value||'',
    submitted_at: new Date().toISOString(),
  };
  orders.push(order);
  alert('✅ Đã gửi đơn tới NCC: '+order.order_code);
  cart=[];
  navigateTo('store_orders');
}

function filterOrders(val,tblId) {
  const rows = document.querySelectorAll(`#${tblId} tr:not(:first-child)`);
  rows.forEach(r=>{ r.style.display=(r.dataset.code||'').toLowerCase().includes(val.toLowerCase())?'':'none'; });
}
function filterByStatus(val,tblId) {
  const rows = document.querySelectorAll(`#${tblId} tr:not(:first-child)`);
  rows.forEach(r=>{ r.style.display=(!val||r.dataset.status===val)?'':'none'; });
}

function viewOrder(id) {
  const o = orders.find(x=>x.id===id);
  if (!o) return;
  const canDeliver = (currentUser.role==='admin'||currentUser.role==='buyer_head_office') && o.status==='confirmed';
  const canClose = (currentUser.role==='admin'||currentUser.role==='buyer_head_office') && o.status==='delivered';
  showModal(`
    <div class="modal-title">📋 ${o.order_code}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;font-size:13px">
      <div><strong>Cửa hàng:</strong> ${o.store_name}</div>
      <div><strong>NCC:</strong> ${o.supplier_name}</div>
      <div><strong>Ngày đặt:</strong> ${fmtDate(o.order_date)}</div>
      <div><strong>Ngày giao:</strong> ${fmtDate(o.delivery_date)}</div>
      <div><strong>Trạng thái:</strong> ${statusBadge(o.status)}</div>
      <div><strong>Tổng:</strong> <span style="color:var(--primary);font-weight:700">${fmtMoney(o.total)}</span></div>
    </div>
    ${o.reject_reason?`<div style="background:#ffebee;padding:10px;border-radius:8px;margin-bottom:12px;font-size:13px;color:#c62828">❌ Lý do từ chối: ${o.reject_reason}</div>`:''}
    <table style="margin-bottom:16px">
      <tr><th>Sản phẩm</th><th>ĐVT</th><th>SL đặt</th><th>SL xác nhận</th><th>Đơn giá</th></tr>
      ${(o.items||[]).map(i=>`<tr><td>${i.name}</td><td>${i.unit}</td><td>${i.ordered_qty}</td><td>${i.confirmed_qty||'-'}</td><td>${fmtMoney(i.price)}</td></tr>`).join('')}
    </table>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${canDeliver?`<button class="btn-sm btn-success" onclick="markDelivered('${o.id}')">🚚 Đánh dấu đã giao</button>`:''}
      ${canClose?`<button class="btn-sm btn-primary-sm" onclick="closeOrder('${o.id}')">✅ Đóng đơn</button>`:''}
      <button class="btn-sm btn-outline" onclick="closeModal()">Đóng</button>
    </div>
  `);
}

function cancelOrder(id) {
  if (!confirm('Xác nhận hủy đơn hàng này?')) return;
  const o = orders.find(x=>x.id===id);
  if (o) o.status='cancelled';
  navigateTo(currentPage);
}
function markDelivered(id) {
  const o=orders.find(x=>x.id===id);
  if(o)o.status='delivered';
  closeModal();
  navigateTo(currentPage);
}
function closeOrder(id) {
  const o=orders.find(x=>x.id===id);
  if(o)o.status='closed';
  closeModal();
  navigateTo(currentPage);
}

function confirmOrderModal(id) {
  const o = orders.find(x=>x.id===id);
  if (!o) return;
  const itemRows = (o.items||[]).map((item,i)=>`
    <tr>
      <td>${item.name}</td>
      <td>${item.unit}</td>
      <td style="text-align:center">${item.ordered_qty}</td>
      <td><input type="number" class="qty-input" id="cqty_${i}" value="${item.ordered_qty}" min="0" max="${item.ordered_qty}"></td>
      <td>${fmtMoney(item.price)}</td>
    </tr>`).join('');
  showModal(`
    <div class="modal-title">✅ Xác nhận đơn: ${o.order_code}</div>
    <div style="font-size:13px;margin-bottom:16px;color:var(--gray)">Cửa hàng: ${o.store_name} | Ngày giao: ${fmtDate(o.delivery_date)}</div>
    <table style="margin-bottom:16px">
      <tr><th>Sản phẩm</th><th>ĐVT</th><th>SL đặt</th><th>SL xác nhận</th><th>Đơn giá</th></tr>
      ${itemRows}
    </table>
    <div class="form-group">
      <label>Ghi chú phản hồi</label>
      <textarea id="supplierNote" rows="2" placeholder="Ghi chú thêm..."></textarea>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-sm btn-success" onclick="doConfirmFull('${id}')">✅ Xác nhận đủ</button>
      <button class="btn-sm btn-primary-sm" onclick="doConfirmPartial('${id}',${o.items?.length||0})">🔄 Xác nhận một phần</button>
      <button class="btn-sm btn-danger" onclick="doRejectModal('${id}')">❌ Từ chối</button>
      <button class="btn-sm btn-outline" onclick="closeModal()">Hủy</button>
    </div>
  `);
}

function doConfirmFull(id) {
  const o=orders.find(x=>x.id===id);
  if(!o)return;
  o.status='confirmed';
  o.supplier_responded_at=new Date().toISOString();
  (o.items||[]).forEach(i=>{i.confirmed_qty=i.ordered_qty;i.item_status='confirmed';});
  closeModal();
  alert('✅ Đã xác nhận toàn bộ đơn hàng');
  navigateTo(currentPage);
}

function doConfirmPartial(id,itemCount) {
  const o=orders.find(x=>x.id===id);
  if(!o)return;
  if(!o.items||o.items.length===0){alert('Đơn hàng không có sản phẩm');return;}
  let hasPartial=false;
  for(let i=0;i<itemCount;i++){
    const cqty=parseInt(document.getElementById('cqty_'+i)?.value)||0;
    if(o.items[i]){
      o.items[i].confirmed_qty=cqty;
      if(cqty<o.items[i].ordered_qty)hasPartial=true;
      o.items[i].item_status=cqty===0?'rejected':cqty<o.items[i].ordered_qty?'partial':'confirmed';
    }
  }
  o.status=hasPartial?'partial_confirmed':'confirmed';
  o.supplier_responded_at=new Date().toISOString();
  o.supplier_note=document.getElementById('supplierNote')?.value||'';
  closeModal();
  alert('✅ Đã xác nhận '+(hasPartial?'một phần':'toàn bộ')+' đơn hàng');
  navigateTo(currentPage);
}

function doRejectModal(id) {
  closeModal();
  showModal(`
    <div class="modal-title">❌ Từ chối đơn hàng</div>
    <div class="form-group">
      <label>Lý do từ chối *</label>
      <textarea id="rejectReason" rows="3" placeholder="Nhập lý do từ chối..."></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-sm btn-danger" onclick="doReject('${id}')">Xác nhận từ chối</button>
      <button class="btn-sm btn-outline" onclick="closeModal()">Hủy</button>
    </div>
  `);
}

function doReject(id) {
  const reason=document.getElementById('rejectReason')?.value?.trim();
  if(!reason){alert('Vui lòng nhập lý do từ chối');return;}
  const o=orders.find(x=>x.id===id);
  if(o){o.status='rejected';o.reject_reason=reason;o.supplier_responded_at=new Date().toISOString();}
  closeModal();
  alert('Đã từ chối đơn hàng');
  navigateTo(currentPage);
}

      <div class="card-title">📦 Danh sách sản phẩm (${allProds.length})</div>
      <table>
        <tr><th>Mã SP</th><th>Tên sản phẩm</th><th>NCC</th><th>ĐVT</th><th>Đơn giá</th></tr>
        ${allProds.map(p=>`<tr>
          <td>${p.id}</td><td>${p.name}</td>
          <td>${SUPPLIERS.find(s=>s.id===p.nccId)?.name||p.nccId}</td>
          <td>${p.unit}</td><td>${fmtMoney(p.price)}</td>
        </tr>`).join('')}
      </table>
    </div>`;
}

function renderAdminLogs() {
  const events = orders.flatMap(o=>[
    {time:o.order_date,type:'order_created',desc:`Tạo đơn ${o.order_code}`,store:o.store_name},
    o.submitted_at?{time:o.submitted_at,type:'submitted',desc:`Gửi NCC: ${o.order_code}`,store:o.store_name}:null,
    o.supplier_responded_at?{time:o.supplier_responded_at,type:o.status,desc:`NCC phản hồi: ${o.order_code} → ${o.status}`,store:o.supplier_name}:null,
  ].filter(Boolean)).sort((a,b)=>new Date(b.time)-new Date(a.time));
  return `
    <div class="card">
      <div class="card-title">📜 Event Logs (${events.length})</div>
      <div class="timeline">
        ${events.map(e=>`<div class="tl-item">
          <div class="tl-dot"></div>
          <div class="tl-content">
            <div class="tl-title">${e.desc}</div>
            <div class="tl-time">${new Date(e.time).toLocaleString('vi-VN')} · ${e.store}</div>
          </div>
        </div>`).join('')}
      </div>
      ${events.length===0?'<div class="empty"><div class="icon">📜</div><p>Chưa có sự kiện nào</p></div>':''}
    </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function showModal(html) {
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">${html}</div>
    </div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML=''; }

// ── INIT ──────────────────────────────────────────────────────────────────────
const saved = localStorage.getItem('vos_user');
if (saved) { try { currentUser=JSON.parse(saved); showApp(); } catch(e){ localStorage.removeItem('vos_user'); } }
</script>
